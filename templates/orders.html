{% extends "base.html" %}

{% block content %}

<h2>My Orders</h2>

<table border="1" cellpadding="10">

<tr>
<th>Name</th>
<th>Total</th>
<th>Date</th>
</tr>

{% for order in orders %}

<tr>

<td>{{ order.name }}</td>

<td>₹{{ order.total }}</td>

<td>{{ order.created_at }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
