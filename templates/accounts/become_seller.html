{% extends "base.html" %}

{% block content %}
<style>
.seller-form-page{
    max-width: 760px;
    margin: 30px auto;
    padding: 20px;
}
.seller-form-card{
    background: #fff;
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid #ececf3;
}
.seller-form-title{
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    color: #111827;
}
.seller-form-subtitle{
    color: #6b7280;
    margin-bottom: 24px;
}
.seller-form-card form p{
    margin-bottom: 16px;
}
.seller-form-card label{
    display: block;
    font-weight: 700;
    margin-bottom: 6px;
    color: #111827;
}
.seller-form-card input,
.seller-form-card textarea,
.seller-form-card select{
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    outline: none;
}
.seller-form-card button{
    margin-top: 10px;
    background: linear-gradient(135deg, #7c3aed, #9333ea);
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
}
</style>

<div class="seller-form-page">
    <div class="seller-form-card">
        <div class="seller-form-title">Become a Seller</div>
        <div class="seller-form-subtitle">Fill your shop details and submit your application.</div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Submit Application</button>
        </form>
    </div>
</div>
{% endblock %}
